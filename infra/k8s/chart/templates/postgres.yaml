{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: { {{- include "llm-observe.labels" . | nindent 4 }} }
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: observe
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-secrets, key: password } }
            - name: POSTGRES_DB
              value: observe
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "observe", "-d", "observe"] }
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: {{ .Values.postgres.storage }} } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres }
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
{{- end }}
