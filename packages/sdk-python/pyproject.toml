[project]
name = "llm-observe"
version = "0.1.0"
description = "Non-invasive telemetry SDK for LLM inference calls."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.34",
    "httpx>=0.27",
    "openai>=1.40",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "shared-schema",
    "tiktoken>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_observe"]

[tool.uv.sources]
shared-schema = { workspace = true }
