[project]
name = "shared-schema"
version = "0.1.0"
description = "Shared payload schema for the llm-observe platform."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_schema"]
