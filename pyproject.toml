[tool.uv.workspace]
members = [
    "packages/shared-schema/python",
    "packages/sdk-python",
    "services/ingestion",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC", "S", "C4", "RET", "SIM"]
ignore = ["E501", "S101"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "B"]
"**/examples/**" = ["S105", "S106"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/sdk-python/tests", "services/ingestion/tests"]
